<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Apnosh — Mobile preview (branded)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family:'Cal Sans'; font-style:normal; font-weight:600; font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/calcom/font/fonts/webfonts/CalSans-SemiBold.woff2') format('woff2');
  }
  :root {
    --font-display:'Cal Sans','Inter',system-ui,sans-serif;
    --font-body:'Inter',system-ui,-apple-system,sans-serif;
    --font-serif:'Playfair Display',Georgia,serif;
    --ink:#1d1d1f; --ink-2:#424245; --ink-3:#6e6e73; --ink-4:#aeaeb2;
    --bg:#ffffff; --surface:#ffffff;
    --brand:#4abd98; --brand-d:#2e9a78; --brand-g:rgba(74,189,152,0.15); --brand-t:#eaf7f3;
    --drop:#c2453d; --hairline-2:#ececf0;
    --chart-line:#2e9a78; --chart-fill:rgba(74,189,152,0.32);
    --num-font:var(--font-display); --num-weight:600; --num-size:98px; --num-spacing:-0.02em;
    --ease-out:cubic-bezier(.16,1,.3,1);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body { background:#e9e9ee; font-family:var(--font-body); -webkit-font-smoothing:antialiased; min-height:100vh; }

  .switcher { position:sticky; top:0; z-index:50; display:flex; gap:6px; justify-content:center; padding:10px; background:rgba(255,255,255,0.9); backdrop-filter:blur(8px); border-bottom:1px solid #e4e4e9; }
  .switcher button { border:0; cursor:pointer; padding:8px 14px; border-radius:9999px; font-size:12.5px; font-weight:600; font-family:var(--font-body); color:#6e6e73; background:rgba(0,0,0,0.05); }
  .switcher button.on { background:#1d1d1f; color:#fff; }

  .frame { max-width:402px; margin:0 auto; background:var(--bg); min-height:100vh; }
  @media (min-width:440px) { body { padding:0 0 28px; } .stage { padding:18px 0 28px; } .frame { border-radius:34px; overflow:hidden; box-shadow:0 28px 80px rgba(0,0,0,.18); min-height:auto; } }

  .screen { background:var(--bg); padding-bottom:30px; color:var(--ink); }
  .frame[data-theme="clean"] .screen { background:linear-gradient(180deg,#f0faf6 0%,#ffffff 26%); }

  header.app { display:flex; align-items:center; justify-content:space-between; padding:16px 22px 4px; gap:12px; }
  .rname { font-family:var(--font-display); font-size:18px; font-weight:400; letter-spacing:-0.01em; color:var(--ink); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bell { width:40px; height:40px; border-radius:9999px; color:var(--ink-2); display:inline-flex; align-items:center; justify-content:center; position:relative; flex-shrink:0; margin-right:-8px; background:none; border:0; }
  .bell .dot { position:absolute; top:7px; right:8px; width:8px; height:8px; border-radius:9999px; background:var(--brand); }

  .spot { position:relative; padding:20px 22px 22px; }
  .t-eyebrow { font-family:var(--font-body); font-size:11.5px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; color:var(--brand-d); margin:0; }
  .eb-pill { display:inline-block; background:var(--brand-g); padding:5px 12px; border-radius:99px; }
  .hero-num { font-family:var(--num-font); font-weight:var(--num-weight); font-size:var(--num-size); letter-spacing:var(--num-spacing); line-height:.92; color:var(--ink); margin:16px 0 0; font-variant-numeric:tabular-nums; }
  .delta { display:inline-flex; align-items:center; gap:5px; margin-top:14px; min-height:22px; font-weight:600; font-size:16px; }
  .delta.up { color:var(--brand-d); } .delta.down { color:var(--drop); }
  .chartwrap { margin-top:28px; margin-left:-22px; margin-right:-22px; }
  .chartbox { width:100%; height:180px; position:relative; touch-action:none; cursor:ew-resize; user-select:none; }
  .xrow { display:flex; justify-content:space-between; margin-top:6px; padding:0 22px; font-size:10.5px; color:var(--ink-4); white-space:nowrap; font-variant-numeric:tabular-nums; }

  .seg { position:relative; display:grid; grid-template-columns:repeat(5,1fr); margin-top:20px; background:#f1f1f4; border-radius:9999px; padding:3px; }
  .seg-ind { position:absolute; top:3px; bottom:3px; left:3px; width:calc((100% - 6px)/5); border-radius:9999px; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.10); transition:transform .30s var(--ease-out); }
  .seg-btn { position:relative; z-index:1; height:30px; border:0; background:none; font-family:inherit; font-size:12.5px; font-weight:600; color:var(--ink-3); cursor:pointer; transition:color .2s ease; }
  .seg-btn.on { color:var(--brand-d); }

  .srcwrap { margin-top:18px; padding-top:14px; border-top:1px solid var(--hairline-2); }
  .srcrow { display:flex; justify-content:space-between; gap:16px; padding-top:4px; }
  .src .l { font-size:11px; font-weight:500; color:var(--ink-3); letter-spacing:.02em; text-transform:uppercase; }
  .src .v { display:block; font-family:var(--font-display); font-size:21px; font-weight:600; color:var(--ink); letter-spacing:-0.01em; line-height:1; margin-top:4px; font-variant-numeric:tabular-nums; }

  .sx { padding:24px 22px 6px; }
  .sx-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .btn-quiet { display:inline-flex; align-items:center; gap:4px; background:none; border:0; color:var(--brand-d); font-weight:600; font-size:13px; cursor:pointer; padding:0; font-family:inherit; }
  .list { list-style:none; margin:0; padding:0; }
  .row { display:flex; align-items:center; gap:12px; width:100%; background:none; border:0; padding:16px 0; text-align:left; border-top:1px solid var(--hairline-2); cursor:pointer; font-family:inherit; color:var(--ink); }
  .list li:first-child .row { border-top:0; }
  .row:active { opacity:.5; }
  .rowt { flex:1; min-width:0; font-size:16px; font-weight:600; color:var(--ink); margin:0; }
  .rowt .muted { color:var(--ink-3); font-weight:400; }
  .chip { font-size:12px; color:var(--brand-d); background:var(--brand-t); padding:4px 10px; border-radius:9999px; font-variant-numeric:tabular-nums; font-weight:600; white-space:nowrap; flex-shrink:0; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .screen > * { animation:fadeUp .5s var(--ease-out) both; }
  .screen > *:nth-child(2){ animation-delay:.05s; } .screen > *:nth-child(3){ animation-delay:.11s; } .screen > *:nth-child(4){ animation-delay:.17s; }
  @media (prefers-reduced-motion:reduce){ .screen > *{ animation:none; } }

  /* Editorial theme */
  .frame[data-theme="editorial"] {
    --ink:#1c1813; --ink-2:#4a4338; --ink-3:#857b6c; --ink-4:#b6ab98;
    --bg:#f7f3ec; --surface:#fffdf8; --hairline-2:#e5ddcf;
    --brand:#2f7d5e; --brand-d:#2f7d5e; --brand-g:rgba(47,125,94,0.12); --brand-t:#e9f0e9;
    --chart-line:#2f7d5e; --chart-fill:rgba(47,125,94,0.18);
    --num-font:var(--font-serif); --num-weight:600; --num-size:104px; --num-spacing:-0.02em;
  }
  body:has(.frame[data-theme="editorial"]) { background:#cfc7b6; }
  .seg { --seg:#f1f1f4; }
</style>
</head>
<body>
<div id="root">
  <div class="switcher">
    <button data-theme-btn="clean" class="on">Clean</button>
    <button data-theme-btn="editorial">Editorial</button>
  </div>
  <div class="stage">
    <div class="frame" data-theme="clean">
      <div class="screen">
        <header class="app">
          <p class="rname" id="rname">Yellow Bee Market</p>
          <button class="bell" aria-label="Inbox">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            <span class="dot"></span>
          </button>
        </header>

        <section class="spot">
          <p class="t-eyebrow">Customers</p>
          <p class="hero-num" id="num">127</p>
          <p class="delta up" id="delta"></p>
          <div class="chartwrap">
            <div class="chartbox" id="chartbox">
              <svg id="svg" viewBox="0 0 402 180" width="100%" height="180" preserveAspectRatio="none" aria-hidden="true" style="display:block">
                <defs>
                  <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--chart-fill)"/><stop offset="100%" stop-color="transparent"/></linearGradient>
                  <linearGradient id="strk" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="var(--chart-line)" stop-opacity="0.5"/><stop offset="100%" stop-color="var(--chart-line)" stop-opacity="1"/></linearGradient>
                </defs>
                <path id="area" fill="url(#fill)"></path>
                <path id="line" fill="none" stroke="url(#strk)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></path>
                <circle id="halo" r="9" fill="var(--chart-line)" opacity="0.14"></circle>
                <circle id="dot" r="4" fill="var(--surface)" stroke="var(--chart-line)" stroke-width="2.4"></circle>
                <g id="scrub" style="display:none"><line id="sline" stroke="var(--ink-4)" stroke-width="1" stroke-dasharray="3 4" vector-effect="non-scaling-stroke"></line><circle id="sdot" r="5.5" fill="var(--surface)" stroke="var(--chart-line)" stroke-width="2.4"></circle></g>
              </svg>
            </div>
            <div class="xrow"><span id="x0"></span><span id="x1"></span></div>
          </div>

          <div class="seg" id="seg">
            <div class="seg-ind" id="segind"></div>
            <button class="seg-btn on" data-r="week">Week</button>
            <button class="seg-btn" data-r="month">Month</button>
            <button class="seg-btn" data-r="3m">3M</button>
            <button class="seg-btn" data-r="year">Year</button>
            <button class="seg-btn" data-r="all">All</button>
          </div>

          <div class="srcwrap"><div class="srcrow" id="sources"></div></div>
        </section>

        <section class="sx">
          <div class="sx-head"><p class="t-eyebrow eb-pill">Needs you · 3</p><button class="btn-quiet">Inbox <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button></div>
          <ul class="list" id="needs"></ul>
        </section>

        <section class="sx">
          <div class="sx-head"><p class="t-eyebrow eb-pill">This week</p></div>
          <ul class="list" id="week"></ul>
        </section>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var chevR = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';
  function wave(base,n,amp,drift){var a=[];for(var i=0;i<n;i++){a.push(Math.max(0,Math.round(base+Math.sin(i/1.7)*amp+(i/n)*drift+(Math.random()*amp*0.4))));}return a;}
  var SOURCES=[['Google',89],['Maps',27],['Site',11]];
  function range(total,n,delta,dir,x0,x1){return {total:total,delta:delta,dir:dir,x:[x0,x1],points:wave(total/n*0.85,n,total/n*0.5,total/n*0.4),sources:SOURCES};}
  var RANGES={ week:range(127,14,'+23','up','May 6','Today'), month:range(512,30,'+8%','up','Apr 20','Today'), '3m':range(1480,13,'+19%','up','Feb','May'), year:range(6120,12,'+34%','up','2025','2026'), all:range(9400,18,null,'up','Start','Now') };
  var ORDER=['week','month','3m','year','all'];
  var NEEDS=[['Reply to a 3-star review','2 min'],["Approve Friday's Instagram post",'30 sec'],['Set Memorial Day hours','1 min']];

  var W=402,H=180,padT=12,padB=6,innerH=H-padT-padB;
  var cur='week', scrubbing=false;

  function smooth(pts){ if(!pts.length)return''; if(pts.length===1)return'M '+pts[0].x+' '+pts[0].y; var t=0.18,d='M '+pts[0].x.toFixed(2)+' '+pts[0].y.toFixed(2); for(var i=0;i<pts.length-1;i++){var p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;var c1x=p1.x+(p2.x-p0.x)*t,c1y=p1.y+(p2.y-p0.y)*t,c2x=p2.x-(p3.x-p1.x)*t,c2y=p2.y-(p3.y-p1.y)*t; d+=' C '+c1x.toFixed(2)+' '+c1y.toFixed(2)+', '+c2x.toFixed(2)+' '+c2y.toFixed(2)+', '+p2.x.toFixed(2)+' '+p2.y.toFixed(2);} return d; }
  function coords(vals){ var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),yr=Math.max(max-min,0.0001); var n=vals.length; return vals.map(function(v,i){var x=n===1?W/2:(i*W)/(n-1); var y=padT+innerH-((v-min)/yr)*innerH; return {x:x,y:y};}); }
  function $(id){return document.getElementById(id);}

  function render(){
    var r=RANGES[cur], pts=coords(r.points);
    var line=smooth(pts), area=line+' L '+W+' '+(padT+innerH)+' L 0 '+(padT+innerH)+' Z';
    $('line').setAttribute('d',line); $('area').setAttribute('d',area);
    var last=pts[pts.length-1];
    $('halo').setAttribute('cx',last.x); $('halo').setAttribute('cy',last.y);
    $('dot').setAttribute('cx',last.x); $('dot').setAttribute('cy',last.y);
    if(!scrubbing){ $('num').textContent=r.total.toLocaleString(); }
    var d=$('delta');
    if(r.delta){ d.className='delta '+(r.dir==='up'?'up':'down'); var arrow=r.dir==='up'?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>'; d.innerHTML=arrow+'<span>'+r.delta+'</span>'; d.style.visibility='visible'; }
    else { d.style.visibility='hidden'; }
    $('x0').textContent=r.x[0]; $('x1').textContent=r.x[1];
    $('sources').innerHTML=r.sources.map(function(s){return '<div class="src"><span class="l">'+s[0]+'</span><span class="v">'+s[1].toLocaleString()+'</span></div>';}).join('');
  }

  function setRange(rk){ cur=rk; scrubbing=false; $('scrub').style.display='none'; $('dot').style.display=''; $('halo').style.display='';
    var idx=ORDER.indexOf(rk); $('segind').style.transform='translateX('+(idx*100)+'%)';
    var btns=document.querySelectorAll('.seg-btn'); for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('on', btns[i].getAttribute('data-r')===rk); }
    render();
  }

  // scrub
  var box=$('chartbox');
  function idxFromEvent(e){ var rect=box.getBoundingClientRect(); var cx=(e.clientX!=null?e.clientX:(e.touches&&e.touches[0]?e.touches[0].clientX:0)); var x=cx-rect.left; var t=Math.max(0,Math.min(1,x/rect.width)); return Math.round(t*(RANGES[cur].points.length-1)); }
  function scrubTo(i){ var r=RANGES[cur],pts=coords(r.points); i=Math.max(0,Math.min(pts.length-1,i)); scrubbing=true; $('num').textContent=r.points[i].toLocaleString(); $('delta').style.visibility='hidden';
    $('dot').style.display='none'; $('halo').style.display='none'; var g=$('scrub'); g.style.display=''; $('sline').setAttribute('x1',pts[i].x); $('sline').setAttribute('x2',pts[i].x); $('sline').setAttribute('y1',padT); $('sline').setAttribute('y2',padT+innerH); $('sdot').setAttribute('cx',pts[i].x); $('sdot').setAttribute('cy',pts[i].y); }
  function endScrub(){ scrubbing=false; $('scrub').style.display='none'; $('dot').style.display=''; $('halo').style.display=''; render(); }
  box.addEventListener('pointerdown',function(e){ e.preventDefault(); try{box.setPointerCapture(e.pointerId);}catch(_){} scrubTo(idxFromEvent(e)); });
  box.addEventListener('pointermove',function(e){ if(scrubbing) scrubTo(idxFromEvent(e)); });
  box.addEventListener('pointerup',endScrub); box.addEventListener('pointercancel',endScrub);

  // range pills
  document.querySelectorAll('.seg-btn').forEach(function(b){ b.addEventListener('click',function(){ setRange(b.getAttribute('data-r')); }); });
  // theme switch
  document.querySelectorAll('[data-theme-btn]').forEach(function(b){ b.addEventListener('click',function(){ document.querySelector('.frame').setAttribute('data-theme', b.getAttribute('data-theme-btn')); document.querySelectorAll('[data-theme-btn]').forEach(function(x){x.classList.toggle('on',x===b);}); }); });

  // static lists
  $('needs').innerHTML=NEEDS.map(function(n){return '<li><button class="row"><p class="rowt">'+n[0]+'</p><span class="chip">'+n[1]+'</span>'+chevR+'</button></li>';}).join('');
  $('week').innerHTML=[
    '<li><button class="row"><p class="rowt"><b>7</b> <span class="muted">shipped</span></p>'+chevR+'</button></li>',
    '<li><button class="row"><p class="rowt"><b>3</b> <span class="muted">coming up</span></p>'+chevR+'</button></li>',
    '<li><button class="row"><p class="rowt"><span style="font-weight:600">Maria</span> <span class="muted">your strategist</span></p>'+chevR+'</button></li>'
  ].join('');

  setRange('week');
})();
</script>
</body>
</html>
