<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Apnosh — Mobile preview (branded)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family:'Cal Sans'; font-style:normal; font-weight:600; font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/calcom/font/fonts/webfonts/CalSans-SemiBold.woff2') format('woff2');
  }
  :root {
    --font-display:'Cal Sans','Inter',system-ui,sans-serif;
    --font-body:'Inter',system-ui,-apple-system,sans-serif;
    --font-serif:'Playfair Display',Georgia,serif;
    --ink:#1d1d1f; --ink-2:#424245; --ink-3:#6e6e73; --ink-4:#aeaeb2;
    --bg:#ffffff; --surface:#ffffff;
    --brand:#4abd98; --brand-d:#2e9a78; --brand-g:rgba(74,189,152,0.15); --brand-t:#eaf7f3;
    --drop:#c2453d; --hairline-2:#ececf0;
    --chart-line:#2e9a78; --chart-fill:rgba(74,189,152,0.32);
    --num-font:var(--font-display); --num-weight:600; --num-size:58px; --num-spacing:-0.02em;
    --ease-out:cubic-bezier(.16,1,.3,1);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body { background:#e9e9ee; font-family:var(--font-body); -webkit-font-smoothing:antialiased; min-height:100vh; }

  .switcher { position:sticky; top:0; z-index:50; display:flex; gap:6px; justify-content:center; padding:10px; background:rgba(255,255,255,0.9); backdrop-filter:blur(8px); border-bottom:1px solid #e4e4e9; }
  .switcher button { border:0; cursor:pointer; padding:8px 14px; border-radius:9999px; font-size:12.5px; font-weight:600; font-family:var(--font-body); color:#6e6e73; background:rgba(0,0,0,0.05); }
  .switcher button.on { background:#1d1d1f; color:#fff; }

  .frame { max-width:402px; margin:0 auto; background:var(--bg); min-height:100vh; }
  @media (min-width:440px) { body { padding:0 0 28px; } .stage { padding:18px 0 28px; } .frame { border-radius:34px; overflow:hidden; box-shadow:0 28px 80px rgba(0,0,0,.18); min-height:auto; } }

  .screen { background:var(--bg); padding-bottom:92px; color:var(--ink); }
  .frame[data-theme="clean"] .screen { background:linear-gradient(180deg,#f0faf6 0%,#ffffff 26%); }

  header.app { display:flex; align-items:center; justify-content:space-between; padding:16px 22px 4px; gap:12px; }
  .idtext { min-width:0; }
  .rname { font-family:var(--font-display); font-size:16.5px; font-weight:400; letter-spacing:-0.01em; color:var(--ink); line-height:1.15; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rsub { display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--ink-4); margin-top:2px; }
  .rsub .live { width:6px; height:6px; border-radius:9999px; background:var(--brand); flex:0 0 auto; }
  .bell { width:40px; height:40px; border-radius:9999px; color:var(--ink-2); display:inline-flex; align-items:center; justify-content:center; position:relative; flex-shrink:0; margin-right:-8px; background:none; border:0; }
  .bell .dot { position:absolute; top:7px; right:8px; width:8px; height:8px; border-radius:9999px; background:var(--brand); }
  .idwrap { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
  .avatar { width:34px; height:34px; border-radius:9999px; background:var(--brand-t); color:var(--brand-d); font-family:var(--font-display); font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }

  /* Bottom tab bar */
  .tabbar { position:fixed; left:50%; bottom:0; transform:translateX(-50%); width:100%; max-width:402px; height:62px; padding-bottom:env(safe-area-inset-bottom); background:rgba(255,255,255,0.94); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border-top:1px solid var(--hairline-2); display:flex; align-items:center; justify-content:space-around; z-index:60; }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:0; color:var(--ink-4); font-size:10px; font-weight:600; cursor:pointer; font-family:inherit; padding:0; }
  .tab.on { color:var(--ink); }
  .tab svg { width:22px; height:22px; }
  .tab-fab { flex:0 0 auto; width:52px; height:52px; border-radius:9999px; background:var(--brand); color:#fff; display:flex; align-items:center; justify-content:center; border:0; cursor:pointer; box-shadow:0 10px 22px rgba(74,189,152,0.45); margin-top:-20px; }
  .tab-fab svg { width:26px; height:26px; }

  .spot { position:relative; padding:22px 22px 22px; }
  .spot .bell { position:absolute; top:14px; right:14px; margin:0; z-index:5; }
  .t-eyebrow { font-family:var(--font-body); font-size:11.5px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; color:var(--brand-d); margin:0; }
  .eb-pill { display:inline-block; background:var(--brand-g); padding:5px 12px; border-radius:99px; }
  .hero-num { font-family:var(--num-font); font-weight:var(--num-weight); font-size:var(--num-size); letter-spacing:var(--num-spacing); line-height:.92; color:var(--ink); margin:16px 0 0; font-variant-numeric:tabular-nums; }
  .metricsel { position:relative; display:inline-block; }
  .metric-btn { display:inline-flex; align-items:center; gap:5px; background:none; border:0; padding:0; cursor:pointer; font-family:inherit; }
  .mchev { width:13px; height:13px; color:var(--brand-d); transition:transform .2s ease; }
  .metric-btn[aria-expanded="true"] .mchev { transform:rotate(180deg); }
  .metric-menu { position:absolute; top:26px; left:0; z-index:30; background:var(--surface); border:1px solid var(--hairline-2); border-radius:14px; box-shadow:0 14px 34px rgba(0,0,0,0.12); padding:6px; min-width:210px; }
  .metric-menu[hidden] { display:none; }
  .metric-menu button { display:block; width:100%; background:none; border:0; padding:11px 12px; border-radius:9px; font-family:inherit; font-size:14.5px; font-weight:500; color:var(--ink); cursor:pointer; text-align:left; }
  .metric-menu button.on, .metric-menu button:active { background:var(--brand-t); color:var(--brand-d); }
  .delta { display:inline-flex; align-items:center; gap:5px; margin-top:14px; min-height:22px; font-weight:600; font-size:16px; }
  .delta.up { color:var(--brand-d); } .delta.down { color:var(--drop); }
  .delta b { font-weight:700; }
  .delta .ctx { color:var(--ink-2); font-weight:500; font-size:13.5px; margin-left:2px; }
  .subnote { margin:8px 0 0; font-size:12px; color:var(--ink-4); }
  .chartwrap { margin-top:14px; }
  .rangecap { margin:0 0 10px; font-size:11.5px; font-weight:600; color:var(--ink-3); }
  .chartbox { width:100%; height:100px; position:relative; touch-action:none; cursor:pointer; user-select:none; }
  .bars { display:flex; align-items:flex-end; gap:5px; height:100%; }
  .bar { flex:1; min-width:2px; background:var(--chart-line); border-radius:5px 5px 0 0; opacity:.5; transform-origin:bottom; transition:opacity .15s ease; }
  .bar.last { opacity:.9; } .bar.hi { opacity:1; }
  .bar.blank { background:var(--ink-6); opacity:1; }
  .bars.anim .bar { animation:barUp .5s var(--ease-out) both; }
  @keyframes barUp { from { transform:scaleY(0); } to { transform:scaleY(1); } }
  .cmp { position:absolute; left:0; right:0; border-top:1.5px dashed var(--ink-5); pointer-events:none; z-index:2; }
  .cmp[hidden] { display:none; }
  .cmp-l { position:absolute; right:0; top:-8px; font-size:9px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-4); background:var(--bg); padding:0 4px; }
  .bartip { position:absolute; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:11px; font-weight:600; padding:4px 9px; border-radius:8px; white-space:nowrap; pointer-events:none; z-index:6; }
  .bartip[hidden] { display:none; }
  .xrow { display:flex; justify-content:space-between; margin-top:8px; font-size:10px; font-weight:600; letter-spacing:.03em; color:var(--ink-4); white-space:nowrap; }
  .xrow .xl { flex:1; text-align:center; }
  .xrow .xl b { background:var(--ink); color:#fff; border-radius:7px; padding:2px 7px; font-weight:700; }
  .tiles { display:flex; gap:8px; overflow-x:auto; margin-top:18px; padding-bottom:2px; scrollbar-width:none; }
  .tiles::-webkit-scrollbar { display:none; }
  .tile { flex:0 0 auto; min-width:76px; background:#f1f1f4; border-radius:14px; padding:10px 13px; }
  .tile .tv { font-size:18px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; line-height:1.1; }
  .tile .tl { font-size:11px; color:var(--ink-3); margin-top:2px; }
  .minicap { margin:18px 0 6px; font-size:11px; font-weight:600; letter-spacing:.03em; text-transform:uppercase; color:var(--ink-4); }
  .minilabels { display:flex; justify-content:space-between; margin-top:6px; font-size:10px; font-weight:600; color:var(--ink-4); }
  .mini { position:relative; height:44px; margin-top:0; }
  .mini-svg { width:100%; height:100%; display:block; }
  .mdots { position:absolute; inset:0; }
  .mdot { position:absolute; width:7px; height:7px; border-radius:50%; background:var(--chart-line); transform:translate(-50%,-50%); border:0; padding:0; cursor:pointer; }
  .mdot.last { width:11px; height:11px; background:var(--surface); border:2.5px solid var(--chart-line); }
  .mdot.hi { box-shadow:0 0 0 5px var(--brand-g); }
  .minitip { position:absolute; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:11px; font-weight:600; padding:3px 8px; border-radius:7px; white-space:nowrap; pointer-events:none; z-index:6; }
  .minitip[hidden] { display:none; }

  .seg { position:relative; display:grid; grid-template-columns:repeat(5,1fr); margin-top:20px; background:#f1f1f4; border-radius:9999px; padding:3px; }
  .seg-ind { position:absolute; top:3px; bottom:3px; left:3px; width:calc((100% - 6px)/5); border-radius:9999px; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.10); transition:transform .30s var(--ease-out); }
  .seg-btn { position:relative; z-index:1; height:30px; border:0; background:none; font-family:inherit; font-size:12.5px; font-weight:600; color:var(--ink-3); cursor:pointer; transition:color .2s ease; }
  .seg-btn.on { color:var(--brand-d); }

  .srcwrap { margin-top:18px; padding-top:14px; border-top:1px solid var(--hairline-2); }
  .srcrow { display:flex; justify-content:space-between; gap:16px; padding-top:4px; }
  .src .l { font-size:11px; font-weight:500; color:var(--ink-3); letter-spacing:.02em; text-transform:uppercase; }
  .src .v { display:block; font-family:var(--font-display); font-size:21px; font-weight:600; color:var(--ink); letter-spacing:-0.01em; line-height:1; margin-top:4px; font-variant-numeric:tabular-nums; }

  .sx { padding:24px 22px 6px; }
  .sx-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .btn-quiet { display:inline-flex; align-items:center; gap:4px; background:none; border:0; color:var(--brand-d); font-weight:600; font-size:13px; cursor:pointer; padding:0; font-family:inherit; }
  .list { list-style:none; margin:0; padding:0; }
  .row { display:flex; align-items:center; gap:12px; width:100%; background:none; border:0; padding:16px 0; text-align:left; border-top:1px solid var(--hairline-2); cursor:pointer; font-family:inherit; color:var(--ink); }
  .list li:first-child .row { border-top:0; }
  .row:active { opacity:.5; }
  .rowt { flex:1; min-width:0; font-size:16px; font-weight:600; color:var(--ink); margin:0; }
  .rowt .muted { color:var(--ink-3); font-weight:400; }
  .chip { font-size:12px; color:var(--brand-d); background:var(--brand-t); padding:4px 10px; border-radius:9999px; font-variant-numeric:tabular-nums; font-weight:600; white-space:nowrap; flex-shrink:0; }

  /* Plan ahead — horizontal cards under the graph */
  .plan { padding-top:24px; }
  .plan-head { display:flex; align-items:center; justify-content:space-between; padding:0 22px; margin-bottom:10px; }
  .plan-scroll { display:flex; gap:12px; overflow-x:auto; padding:2px 22px 8px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .plan-scroll::-webkit-scrollbar { display:none; }
  .plan-card { scroll-snap-align:start; flex:0 0 75%; background:var(--surface); border:1px solid var(--hairline-2); border-radius:18px; padding:15px 16px 14px; box-shadow:0 6px 22px rgba(0,0,0,0.04); display:flex; flex-direction:column; }
  .plan-when { font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--brand-d); }
  .plan-title { font-family:var(--font-display); font-size:17px; font-weight:600; color:var(--ink); margin:3px 0 0; letter-spacing:-0.01em; }
  .plan-hint { font-size:13px; color:var(--ink-3); margin:3px 0 0; line-height:1.4; }
  .plan-cta { font-size:13px; font-weight:600; color:var(--brand-d); margin-top:10px; }

  /* Your channels — Robinhood-style watchlist rows */
  .chan { display:flex; align-items:center; gap:10px; width:100%; background:none; border:0; border-top:1px solid var(--hairline-2); padding:14px 0; text-align:left; cursor:pointer; font-family:inherit; text-decoration:none; color:inherit; }
  #channels .chan:first-child { border-top:0; }
  .chan:active { opacity:.5; }
  .chan-l { flex:1; min-width:0; }
  .chan-n { display:block; font-size:15px; font-weight:600; color:var(--ink); }
  .chan-s { display:block; font-size:11.5px; color:var(--ink-4); margin-top:1px; }
  .chan-spark { flex:0 0 58px; height:30px; }
  .chan-r { display:flex; flex-direction:column; align-items:flex-end; min-width:62px; }
  .chan-v { font-size:16px; font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums; }
  .chan-d { font-size:12px; font-weight:600; margin-top:1px; }
  .chan-d.up { color:var(--brand-d); } .chan-d.down { color:var(--drop); }
  .chan-chev { flex:0 0 auto; color:var(--ink-4); margin-left:-2px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .screen > * { animation:fadeUp .5s var(--ease-out) both; }
  .screen > *:nth-child(2){ animation-delay:.05s; } .screen > *:nth-child(3){ animation-delay:.11s; } .screen > *:nth-child(4){ animation-delay:.17s; }
  @media (prefers-reduced-motion:reduce){ .screen > *{ animation:none; } }

  /* Editorial theme */
  .frame[data-theme="editorial"] {
    --ink:#1c1813; --ink-2:#4a4338; --ink-3:#857b6c; --ink-4:#b6ab98;
    --bg:#f7f3ec; --surface:#fffdf8; --hairline-2:#e5ddcf;
    --brand:#2f7d5e; --brand-d:#2f7d5e; --brand-g:rgba(47,125,94,0.12); --brand-t:#e9f0e9;
    --chart-line:#2f7d5e; --chart-fill:rgba(47,125,94,0.18);
    --num-font:var(--font-serif); --num-weight:600; --num-size:104px; --num-spacing:-0.02em;
  }
  body:has(.frame[data-theme="editorial"]) { background:#cfc7b6; }
  .seg { --seg:#f1f1f4; }
</style>
</head>
<body>
<div id="root">
  <div class="switcher">
    <button data-theme-btn="clean" class="on">Clean</button>
    <button data-theme-btn="editorial">Editorial</button>
  </div>
  <div class="stage">
    <div class="frame" data-theme="clean">
      <div class="screen">
        <section class="spot">
          <button class="bell" aria-label="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            <span class="dot"></span>
          </button>
          <div class="metricsel">
            <button class="metric-btn" id="mbtn"><span class="t-eyebrow" id="mlabel">Customer actions</span><svg class="mchev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
            <div class="metric-menu" id="mmenu" hidden>
              <button data-m="actions" class="on">Customer actions</button>
              <button data-m="reputation">Reputation</button>
              <button data-m="reach">Reach</button>
            </div>
          </div>
          <p class="hero-num" id="num">0</p>
          <p class="delta up" id="delta"></p>
          <p class="subnote" id="subnote">Calls, directions &amp; website clicks</p>
          <div class="chartwrap">
            <p class="rangecap" id="rangecap"></p>
            <div class="chartbox" id="chartbox">
              <div class="cmp" id="cmp" hidden><span class="cmp-l">vs prev</span></div>
              <div class="bars" id="bars"></div>
              <div class="bartip" id="bartip" hidden></div>
            </div>
            <div class="xrow" id="xrow"></div>
            <div class="tiles" id="tiles"></div>
            <p class="minicap" id="minicap">Weekly trend · tap a point</p>
            <div class="mini" id="mini">
              <svg class="mini-svg" viewBox="0 0 100 40" preserveAspectRatio="none">
                <path id="marea" fill="var(--chart-fill)"></path>
                <path id="mbase" stroke="var(--ink-4)" stroke-width="1" stroke-dasharray="2 3" fill="none" vector-effect="non-scaling-stroke"></path>
                <path id="mline" stroke="var(--chart-line)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></path>
              </svg>
              <div class="mdots" id="mdots"></div>
              <div class="minitip" id="minitip" hidden></div>
            </div>
            <div class="minilabels" id="minilabels"></div>
          </div>

          <div class="seg" id="seg">
            <div class="seg-ind" id="segind"></div>
            <button class="seg-btn on" data-r="week">Week</button>
            <button class="seg-btn" data-r="month">Month</button>
            <button class="seg-btn" data-r="3m">3M</button>
            <button class="seg-btn" data-r="year">Year</button>
            <button class="seg-btn" data-r="all">All</button>
          </div>

        </section>

        <section class="sx">
          <div class="sx-head"><p class="t-eyebrow eb-pill">Needs you · 3</p><button class="btn-quiet">Inbox <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button></div>
          <ul class="list" id="needs"></ul>
        </section>

        <section class="plan">
          <div class="plan-head"><p class="t-eyebrow">Plan ahead</p><button class="btn-quiet">Calendar <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button></div>
          <div class="plan-scroll" id="plan"></div>
        </section>

        <section class="sx">
          <div class="sx-head"><p class="t-eyebrow">Your channels</p><button class="btn-quiet">Analytics <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button></div>
          <div id="channels"></div>
        </section>

        <section class="sx">
          <div class="sx-head"><p class="t-eyebrow">This week</p></div>
          <ul class="list" id="week"></ul>
        </section>
      </div>

      <nav class="tabbar">
        <button class="tab on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/></svg><span>Home</span></button>
        <button class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-5l-2 3h-6l-2-3H2"/><path d="M5.5 6h13l3.5 6v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-6z"/></svg><span>Inbox</span></button>
        <button class="tab-fab" aria-label="Create"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
        <button class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3v17h17"/><path d="m7 14 3-4 3 3 4-6"/></svg><span>Insights</span></button>
        <button class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg><span>Menu</span></button>
      </nav>
    </div>
  </div>
</div>

<script>
(function(){
  var chevR = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';
  function wave(base,n,amp,drift){var a=[];for(var i=0;i<n;i++){a.push(Math.max(0,Math.round(base+Math.sin(i/1.7)*amp+(i/n)*drift+(Math.random()*amp*0.4))));}return a;}
  function rN(total,n,delta,dir,x0,x1){return {total:total,delta:delta,dir:dir,x:[x0,x1],points:wave(total/n*0.8,n,total/n*0.45,total/n*0.5)};}

  var WK=(function(){var L=['SUN','MON','TUE','WED','THU','FRI','SAT'],o=[],t=new Date();for(var i=6;i>=0;i--){o.push(L[new Date(t.getTime()-i*864e5).getDay()]);}return o;})();
  function fmtD(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  function rangeCaption(rk){ var t=new Date(),end=fmtD(t); if(rk==='week') return 'Last 7 days · '+fmtD(new Date(t-6*864e5))+' – '+end; if(rk==='month') return 'Last 30 days · '+fmtD(new Date(t-29*864e5))+' – '+end; if(rk==='3m') return 'Last 3 months · '+fmtD(new Date(t-89*864e5))+' – '+end; if(rk==='year') return 'Last 12 months · '+(t.getFullYear()-1)+'–'+t.getFullYear(); return 'All time'; }
  var METRICS={
    actions:{label:'Customer actions',sub:'Calls, directions & website clicks',fmt:'num',ranges:{week:rN(127,7,'23','up','May 6','Today'),month:rN(512,5,'8%','up','Apr 20','Today'),'3m':rN(1480,12,'19%','up','Feb','May'),year:rN(6120,12,'34%','up','2025','2026'),all:rN(9400,12,null,'up','Start','Now')}},

    reach:{label:'Reach',sub:'People who saw your content',fmt:'num',ranges:{week:rN(8400,7,'18%','up','May 6','Today'),month:rN(31000,5,'12%','up','Apr 20','Today'),'3m':rN(88000,12,'24%','up','Feb','May'),year:rN(360000,12,'40%','up','2025','2026'),all:rN(540000,12,null,'up','Start','Now')}}
  };
  var ORDER=['week','month','3m','year','all'];
  var metric='actions';

  function CR(){return M().ranges[cur]||M().ranges.week;}
  var UP='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>';
  var DOWN='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>';
  var NEEDS=[['Reply to a 3-star review','2 min'],["Approve Friday's Instagram post",'30 sec'],['Set Memorial Day hours','1 min']];

  var W=402,H=120,padT=10,padB=8,innerH=H-padT-padB;
  var cur='week', scrubbing=false;

  function smooth(pts){ if(!pts.length)return''; if(pts.length===1)return'M '+pts[0].x+' '+pts[0].y; var t=0.18,d='M '+pts[0].x.toFixed(2)+' '+pts[0].y.toFixed(2); for(var i=0;i<pts.length-1;i++){var p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;var c1x=p1.x+(p2.x-p0.x)*t,c1y=p1.y+(p2.y-p0.y)*t,c2x=p2.x-(p3.x-p1.x)*t,c2y=p2.y-(p3.y-p1.y)*t; d+=' C '+c1x.toFixed(2)+' '+c1y.toFixed(2)+', '+c2x.toFixed(2)+' '+c2y.toFixed(2)+', '+p2.x.toFixed(2)+' '+p2.y.toFixed(2);} return d; }
  function coords(vals){ var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),yr=Math.max(max-min,0.0001); var n=vals.length; return vals.map(function(v,i){var x=n===1?W/2:(i*W)/(n-1); var y=padT+innerH-((v-min)/yr)*innerH; return {x:x,y:y};}); }
  function $(id){return document.getElementById(id);}
  var PERIOD={week:'last week',month:'last month','3m':'the prior 3 months',year:'last year',all:''};
  var numTimer=null;
  function animateNum(target,fmt){ var el=$('num'); var start=parseFloat((el.textContent||'0').replace(/[^0-9.]/g,''))||0; if(numTimer)cancelAnimationFrame(numTimer); var t0=null,dur=700; function fv(v){ return fmt==='rate'? v.toFixed(1)+'★' : Math.round(v).toLocaleString(); } function step(ts){ if(!t0)t0=ts; var p=Math.min(1,(ts-t0)/dur); var e=1-Math.pow(1-p,3); el.textContent=fv(start+(target-start)*e); if(p<1)numTimer=requestAnimationFrame(step); } numTimer=requestAnimationFrame(step); }
  function drawLine(){ var el=$('line'),a=$('area'); try{ var len=el.getTotalLength(); el.style.transition='none'; el.style.strokeDasharray=len; el.style.strokeDashoffset=len; el.getBoundingClientRect(); el.style.transition='stroke-dashoffset .9s var(--ease-out)'; el.style.strokeDashoffset='0'; a.style.transition='none'; a.style.opacity='0'; a.getBoundingClientRect(); a.style.transition='opacity .8s ease'; a.style.opacity='1'; }catch(e){} }

  var todayDOW=new Date().getDay();
  function sumNN(a){var s=0;for(var i=0;i<a.length;i++)if(a[i]!=null)s+=a[i];return s;}
  function genWeeksNum(base){var ws=[],count=8;for(var i=0;i<count;i++){var weeksAgo=count-1-i,curw=(weeksAgo===0),days=[];for(var d=0;d<7;d++){if(curw&&d>todayDOW)days.push(null);else days.push(Math.max(1,Math.round(base/7+Math.sin((i*7+d)*0.5)*(base/16)+Math.random()*(base/12))));}ws.push({days:days,weeksAgo:weeksAgo});}return ws;}
  function genWeeksRate(){var ws=[],count=8;for(var i=0;i<count;i++){var weeksAgo=count-1-i,curw=(weeksAgo===0),days=[];for(var d=0;d<7;d++){if(curw&&d>todayDOW)days.push(null);else days.push(Math.max(0,Math.round(Math.random()*1.6)));}ws.push({days:days,weeksAgo:weeksAgo,rating:Math.round((4.5+Math.sin(i)*0.18+0.1)*10)/10});}return ws;}
  METRICS.actions.weeks=genWeeksNum(127); METRICS.reach.weeks=genWeeksNum(8400); METRICS.reputation.weeks=genWeeksRate();
  var weekIdx=7, selBar=null, pressing=false;

  function viewModel(){
    var m=M();
    if(cur==='week'){
      var weeks=m.weeks; if(weekIdx>weeks.length-1)weekIdx=weeks.length-1; if(weekIdx<0)weekIdx=0; var wk=weeks[weekIdx];
      var isCur=(weekIdx===weeks.length-1), elapsed=isCur?(todayDOW+1):7;
      var headline,delta=null,dir='up',ctx='',cmpPerDay=null;
      if(m.fmt==='rate'){ headline=wk.rating; if(weekIdx>0){var pr=weeks[weekIdx-1].rating;var dd=Math.round((headline-pr)*10)/10;delta=(dd>=0?'+':'')+dd;dir=dd>=0?'up':'down';ctx='vs last week';} }
      else { headline=sumNN(wk.days); if(weekIdx>0){var pb=isCur?sumNN(weeks[weekIdx-1].days.slice(0,elapsed)):sumNN(weeks[weekIdx-1].days);var diff=headline-pb;delta=Math.abs(diff).toLocaleString();dir=diff>=0?'up':'down';cmpPerDay=pb/elapsed;} }
      var miniVals=weeks.map(function(w){return sumNN(w.days);});
      return {mode:'week',vals:wk.days,fmt:m.fmt,todayIdx:(isCur?todayDOW:-1),headline:headline,delta:delta,dir:dir,ctx:ctx,cmpPerDay:cmpPerDay,miniVals:miniVals,miniSel:weekIdx,cap:(wk.weeksAgo===0?'This week · ':(wk.weeksAgo===1?'Last week · ':''))+wkRange(wk.weeksAgo),dayLabels:DOWL};
    }

  }
  function buildLabels(V){ var el=$('xrow'); if(V.dayLabels){ el.innerHTML=V.dayLabels.map(function(d,i){ return (i===V.todayIdx)? '<span class="xl"><b>'+d+'</b></span>' : '<span class="xl">'+d+'</span>'; }).join(''); } else { var r=CR(); el.innerHTML='<span>'+r.x[0]+'</span><span>'+r.x[1]+'</span>'; } }
  function renderMini(V){ var vals=V.miniVals, n=vals.length; var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),rg=Math.max(max-min,0.0001); var Wm=100,Hm=40,pd=5; var pts=vals.map(function(v,i){return {x:n===1?Wm/2:(i*Wm)/(n-1), y:pd+(Hm-2*pd)-((v-min)/rg)*(Hm-2*pd)};}); var d=smooth(pts); $('mline').setAttribute('d',d); $('marea').setAttribute('d',d+' L '+Wm+' '+Hm+' L 0 '+Hm+' Z'); var avg=0,k; for(k=0;k<n;k++)avg+=vals[k]; avg/=n; var by=(pd+(Hm-2*pd)-((avg-min)/rg)*(Hm-2*pd)); $('mbase').setAttribute('d','M0 '+by.toFixed(1)+' L100 '+by.toFixed(1)); var sel=V.miniSel>=0?V.miniSel:n-1; var dh=''; for(var i=0;i<n;i++){ dh+='<button class="mdot'+(i===sel?' last':'')+'" data-i="'+i+'" style="left:'+pts[i].x.toFixed(1)+'%;top:'+((pts[i].y/Hm)*100).toFixed(1)+'%"></button>'; } $('mdots').innerHTML=dh; var tip=$('minitip'); if(tip)tip.hidden=true; }
  function showMiniTip(i){ var V=viewModel(),dots=$('mdots').children; if(i<0||i>=dots.length)return; for(var k=0;k<dots.length;k++) dots[k].classList.toggle('hi',k===i); var tip=$('minitip'); tip.hidden=false; tip.textContent=V.miniVals[i].toLocaleString(); var el=dots[i],mr=$('mini').getBoundingClientRect(),br=el.getBoundingClientRect(); tip.style.left=(br.left-mr.left+br.width/2)+'px'; tip.style.top=Math.max(-2,(br.top-mr.top)-22)+'px'; }
  function render(skipAnim){
    var V=viewModel(), vals=V.vals, n=vals.length;
    var sel=(selBar!=null && selBar<n && vals[selBar]!=null)? selBar : null;
    var nonnull=vals.filter(function(v){return v!=null;}); if(!nonnull.length)nonnull=[1];

    var cmp=$('cmp'); if(V.cmpPerDay!=null){ cmp.hidden=false; cmp.style.top=(100-(V.cmpPerDay/max)*100).toFixed(1)+'%'; } else { cmp.hidden=true; }

    renderMini(V);
    $('minilabels').innerHTML = V.mode==='week' ? '<span>'+wkStart(M().weeks[0].weeksAgo)+'</span><span>This week</span>' : '<span>'+CR().x[0]+'</span><span>'+CR().x[1]+'</span>';

  function setRange(rk){ cur=rk; scrubbing=false; selBar=null; var tip=$('bartip'); if(tip)tip.hidden=true;

  box.addEventListener('pointerdown',function(e){ e.preventDefault(); try{box.setPointerCapture(e.pointerId);}catch(_){} pressing=true; var i=barIdx(e); var V=viewModel(); if(V.vals[i]==null)return; selBar=(selBar===i?null:i); render(true); });

    '<li><button class="row"><p class="rowt"><span style="font-weight:600">Maria</span> <span class="muted">your strategist</span></p>'+chevR+'</button></li>'

  var chanChev='<svg class="chan-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';
